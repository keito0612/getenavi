version: "3"
services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    tty: true
    stdin_open: true
    command: sh -c "npm install && npx prisma generate && npm run dev"
