version: "3"
services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "5555:5555"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=development
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - MAIL_FROM=noreply@getenavi.local
    volumes:
      - .:/app
      - /app/node_modules
    tty: true
    stdin_open: true
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      - mailhog

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
